# xcodegen spec — the ONLY hand-edited project file. `./build.sh` regenerates the
# .xcodeproj from this (never open Xcode to manage files). Add a target / source
# folder here; commit this, never the generated .xcodeproj (it's .gitignore'd).
name: TinyjamHello
options:
  bundleIdPrefix: com.tinyjam
  deploymentTarget:
    iOS: "15.0"
targets:
  TinyjamHello:
    type: application
    platform: iOS
    sources: [Sources]
    # NOTE: the app-group entitlement is re-added in spike 7 (AUv3), once the group is
    # registered for automatic provisioning. It blocks plain device signing until then,
    # and the AppGroup UserDefaults suite works without it. (Was: application-groups
    # group.com.tinyjam.)
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyjam.hello
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridging-Header.h
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
  TinyjamHelloTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: TinyjamHello
      - sdk: StoreKitTest.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyjam.hello.tests
schemes:
  TinyjamHello:
    build:
      targets:
        TinyjamHello: all
    run: {}
    test:
      targets:
        - TinyjamHelloTests
